<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 160" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="End of profile">
  <defs>
    <radialGradient id="fGrad" cx="50%" cy="100%" r="80%">
      <stop offset="0%"  stop-color="#1d0d3d" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0a0e1a" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="fLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7C3AED" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#00F0FF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </linearGradient>
    <pattern id="fGrid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0 H0 V32" fill="none" stroke="#7C3AED" stroke-width="0.5" opacity="0.10"/>
    </pattern>
    <filter id="fGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="160" fill="#0a0e1a"/>
  <rect width="1200" height="160" fill="url(#fGrad)"/>
  <rect width="1200" height="160" fill="url(#fGrid)"/>

  <!-- Glowing horizontal line -->
  <rect x="0" y="36" width="1200" height="1.5" fill="url(#fLine)" filter="url(#fGlow)"/>

  <!-- Center signature -->
  <g font-family="'JetBrains Mono', 'SF Mono', 'Courier New', monospace" text-anchor="middle">
    <text x="600" y="78" font-size="14" fill="#94A3B8" letter-spacing="2">
      <tspan fill="#00F0FF">//</tspan>
      <tspan dx="6" fill="#A78BFA">END.OF.SCROLL</tspan>
      <tspan dx="6" fill="#475569">—</tspan>
      <tspan dx="6">thanks for stopping by</tspan>
    </text>
    <text x="600" y="106" font-size="11" fill="#475569" letter-spacing="3">
      LINGYI · CHEN · @ · LINGYICHEN-AI
    </text>
    <text x="600" y="132" font-size="10" fill="#7C3AED" opacity="0.6" letter-spacing="4">
      ◆ ◆ ◆
    </text>
  </g>

  <!-- Corner brackets -->
  <g stroke="#7C3AED" stroke-width="1.5" fill="none" opacity="0.6" stroke-linecap="round">
    <path d="M16 16 L16 32 M16 16 L32 16"/>
    <path d="M1184 16 L1184 32 M1184 16 L1168 16"/>
    <path d="M16 144 L16 128 M16 144 L32 144"/>
    <path d="M1184 144 L1184 128 M1184 144 L1168 144"/>
  </g>

  <!-- Pulsing dot -->
  <circle cx="600" cy="36" r="3" fill="#00F0FF" filter="url(#fGlow)">
    <animate attributeName="opacity" values="1;0.2;1" dur="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>
